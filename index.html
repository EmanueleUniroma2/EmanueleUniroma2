<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Emanuele Serrao — Senior Full-Stack Developer</title>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="author" content="Emanuele Serrao" />
    <meta
      name="description"
      content="Emanuele Serrao — Senior Full-Stack Developer. 10+ years across .NET, Java/Spring, React, microservices and Azure cloud."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ink: #14171f;
        --ink-soft: #3b424f;
        --muted: #6b7280;
        --paper: #eef0f4;
        --card: #ffffff;
        --line: #e0e3ea;
        --line-soft: #eef0f4;
        --accent: #2c4be0;
        --accent-ink: #1c2f96;
        --accent-soft: #eaeefe;
        --radius: 14px;
        --maxw: 1080px;
        --bar-h: 60px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        font-size: 16px;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 24px;
      }

      /* ---------- Top bar ---------- */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--bar-h);
        background: rgba(238, 240, 244, 0.82);
        backdrop-filter: saturate(140%) blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .topbar .wrap {
        height: 100%;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .brand {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }
      .brand span {
        color: var(--accent);
      }
      .nav {
        margin-left: auto;
        display: flex;
        gap: 4px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .nav::-webkit-scrollbar {
        display: none;
      }
      .nav a {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.74rem;
        letter-spacing: 0.02em;
        color: var(--ink-soft);
        padding: 7px 11px;
        border-radius: 8px;
        white-space: nowrap;
        transition: background 0.18s, color 0.18s;
      }
      .nav a:hover {
        background: var(--card);
        text-decoration: none;
      }
      .nav a.active {
        color: var(--accent);
        background: var(--accent-soft);
      }
      .print-btn {
        flex: none;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.74rem;
        font-weight: 500;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.18s;
      }
      .print-btn:hover {
        background: var(--accent-ink);
      }

      /* ---------- Hero ---------- */
      .hero {
        padding: 64px 0 40px;
      }
      .hero-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 32px;
        align-items: center;
      }
      .monogram {
        width: 132px;
        height: 132px;
        border-radius: 22px;
        background: linear-gradient(150deg, var(--accent) 0%, var(--accent-ink) 100%);
        color: #fff;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 3rem;
        letter-spacing: -0.03em;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 40px -18px rgba(44, 75, 224, 0.7);
        flex: none;
        overflow: hidden;
        position: relative;
      }
      .monogram img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .hero h1 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: clamp(2.1rem, 6vw, 3.4rem);
        line-height: 1.02;
        letter-spacing: -0.025em;
        margin: 0 0 14px;
      }
      .statusline {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        margin-bottom: 22px;
      }
      .statusline .dot {
        color: var(--line);
      }
      .statusline .live {
        color: var(--accent);
      }
      .statusline .live::before {
        content: "● ";
        font-size: 0.7em;
        vertical-align: 1px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 15px;
        font-size: 0.85rem;
        color: var(--ink-soft);
        transition: border-color 0.18s, transform 0.18s;
      }
      .chip:hover {
        border-color: var(--accent);
        text-decoration: none;
        transform: translateY(-1px);
      }
      .chip b {
        font-family: "JetBrains Mono", monospace;
        font-weight: 500;
        font-size: 0.68rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ---------- Sections ---------- */
      .section {
        scroll-margin-top: calc(var(--bar-h) + 16px);
        padding: 40px 0;
        border-top: 1px solid var(--line);
      }
      .eyebrow {
        display: flex;
        align-items: baseline;
        gap: 14px;
        margin-bottom: 26px;
      }
      .eyebrow .num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--accent);
        font-weight: 500;
      }
      .eyebrow h2 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: clamp(1.4rem, 4vw, 1.9rem);
        letter-spacing: -0.02em;
        margin: 0;
      }
      .eyebrow .rule {
        flex: 1;
        height: 1px;
        background: var(--line);
        align-self: center;
      }

      /* ---------- About ---------- */
      .about p {
        max-width: 72ch;
        color: var(--ink-soft);
        margin: 0 0 1em;
      }
      .about-sub {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.02rem;
        color: var(--ink);
        margin: 1.6em 0 0.5em;
      }

      /* ---------- Featured projects ---------- */
      .proj-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
      }
      .proj-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px;
        display: flex;
        flex-direction: column;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .proj-card:hover {
        border-color: var(--accent);
        box-shadow: 0 18px 40px -26px rgba(28, 47, 150, 0.55);
        transform: translateY(-3px);
        text-decoration: none;
      }
      .proj-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 4px;
      }
      .proj-card h3 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.18rem;
        letter-spacing: -0.01em;
        margin: 0;
        color: var(--ink);
      }
      .proj-kind {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.64rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
        background: var(--accent-soft);
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
      }
      .proj-url {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--accent);
        margin-bottom: 12px;
        word-break: break-all;
      }
      .proj-card p {
        color: var(--ink-soft);
        font-size: 0.92rem;
        margin: 0 0 16px;
        flex: 1;
      }
      .arrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--accent);
        font-weight: 500;
      }

      /* ---------- Tech tags ---------- */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--ink-soft);
        background: var(--line-soft);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 8px;
      }

      /* ---------- Experience timeline ---------- */
      .timeline {
        position: relative;
        padding-left: 26px;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: var(--line);
      }
      .emp {
        position: relative;
        margin-bottom: 30px;
      }
      .emp::before {
        content: "";
        position: absolute;
        left: -25px;
        top: 7px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--card);
        border: 2.5px solid var(--accent);
      }
      .emp-head {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px 12px;
        margin-bottom: 4px;
      }
      .emp-name {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.22rem;
        letter-spacing: -0.01em;
      }
      .emp-date {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.74rem;
        color: var(--muted);
      }
      .emp-role {
        color: var(--accent-ink);
        font-weight: 500;
        font-size: 0.92rem;
        margin-bottom: 16px;
      }
      .proj-item {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px;
        margin-bottom: 12px;
        break-inside: avoid;
      }
      .proj-item-top {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 4px 14px;
        margin-bottom: 6px;
      }
      .proj-item-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.02rem;
        color: var(--ink);
      }
      .proj-item-date {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--muted);
        white-space: nowrap;
      }
      .proj-item-meta {
        font-size: 0.78rem;
        color: var(--muted);
        margin-bottom: 10px;
      }
      .proj-item-meta b {
        color: var(--ink-soft);
        font-weight: 500;
      }
      .proj-item p {
        font-size: 0.9rem;
        color: var(--ink-soft);
        margin: 0 0 12px;
      }

      /* ---------- Skills ---------- */
      .skill-cols {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 28px;
      }
      .skill-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px;
        break-inside: avoid;
      }
      .skill-card h3 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.05rem;
        margin: 0 0 16px;
        letter-spacing: -0.01em;
      }
      .skill-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 0;
      }
      .skill-row .label {
        flex: 1;
        font-size: 0.9rem;
        color: var(--ink-soft);
      }
      .meter {
        display: flex;
        gap: 3px;
      }
      .seg {
        width: 22px;
        height: 7px;
        border-radius: 3px;
        background: var(--line);
      }
      .seg.on {
        background: var(--accent);
      }
      .legend {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 6px;
      }

      .comm-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 18px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line-soft);
      }
      .comm-row:last-child {
        border-bottom: none;
      }
      .comm-lang {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        min-width: 84px;
      }
      .comm-skill {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: var(--muted);
      }
      .comm-level {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        background: var(--accent-soft);
        padding: 2px 8px;
        border-radius: 6px;
        margin-left: auto;
      }

      /* ---------- Education & certs ---------- */
      .edu-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 18px;
        break-inside: avoid;
      }
      .edu-card h3 {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        margin: 0 0 4px;
      }
      .edu-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.76rem;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .edu-card p {
        color: var(--ink-soft);
        font-size: 0.92rem;
        margin: 0;
      }
      .edu-score {
        display: inline-block;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.74rem;
        color: var(--accent-ink);
        background: var(--accent-soft);
        border-radius: 6px;
        padding: 3px 9px;
        margin-top: 10px;
      }
      .cert-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }
      .cert {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 18px;
        break-inside: avoid;
      }
      .cert .code {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 600;
        font-size: 1.1rem;
        color: var(--accent);
      }
      .cert .who {
        font-size: 0.86rem;
        color: var(--ink-soft);
      }
      .cert .when {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 4px;
      }

      /* ---------- Footer ---------- */
      .footer {
        border-top: 1px solid var(--line);
        padding: 28px 0 40px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.74rem;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 18px;
        justify-content: space-between;
      }

      /* ---------- Reveal animation ---------- */
      .reveal {
        opacity: 0;
        transform: translateY(14px);
        transition: opacity 0.6s ease, transform 0.6s ease;
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 720px) {
        .wrap {
          padding: 0 18px;
        }
        .hero {
          padding: 40px 0 28px;
        }
        .hero-grid {
          grid-template-columns: 1fr;
          gap: 22px;
          text-align: left;
        }
        .monogram {
          width: 92px;
          height: 92px;
          font-size: 2.1rem;
          border-radius: 18px;
        }
        .brand {
          display: none;
        }
        .nav {
          margin-left: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        .reveal {
          opacity: 1;
          transform: none;
          transition: none;
        }
      }

      /* ---------- Print / Save as PDF ---------- */
      @media print {
        :root {
          --accent: #1c2f96;
        }
        body {
          background: #fff;
          font-size: 10.5pt;
          line-height: 1.45;
        }
        .topbar,
        .footer,
        .print-btn,
        .nav {
          display: none !important;
        }
        .wrap {
          max-width: none;
          padding: 0;
        }
        .hero {
          padding: 0 0 16px;
        }
        .hero-grid {
          grid-template-columns: auto 1fr;
          gap: 20px;
        }
        .monogram {
          width: 78px;
          height: 78px;
          font-size: 1.8rem;
          box-shadow: none;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        .section {
          padding: 14px 0;
          break-inside: avoid-page;
        }
        #experience {
          break-before: page;
        }
        #education {
          break-before: page;
        }
        .proj-card,
        .proj-item,
        .skill-card,
        .emp,
        .cert,
        .edu-card {
          box-shadow: none !important;
          break-inside: avoid;
        }
        .chip,
        .tag,
        .seg.on,
        .proj-kind,
        .comm-level,
        .edu-score {
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        a {
          color: var(--ink);
        }
        .reveal {
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </head>

    <!-- ============ RENDER LOGIC ============ -->
    <script>
      const CV = JSON.parse(document.getElementById("cv-data").textContent);

      /* ---------- date helpers ---------- */
      const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const MONTH_MAP = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
      const NOW = new Date();
      const NOW_NUM = NOW.getFullYear() * 12 + (NOW.getMonth() + 1);

      function dateNum(range, isStart) {
        const parts = range.split("/").map((s) => s.trim());
        const piece = isStart ? parts[0] : parts[1] || parts[0];
        if (/current/i.test(piece)) return NOW_NUM;
        const [mStr, yStr] = piece.split(/\s+/);
        const m = MONTH_MAP[(mStr || "").slice(0, 3).toLowerCase()];
        const y = parseInt(yStr, 10);
        if (!m || isNaN(y)) return 0;
        return y * 12 + m;
      }
      function fmt(num) {
        if (num >= NOW_NUM) return "Present";
        const y = Math.floor((num - 1) / 12);
        const m = ((num - 1) % 12) + 1;
        return MONTHS[m - 1] + " " + y;
      }

      function el(tag, cls, html) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (html != null) e.innerHTML = html;
        return e;
      }
      function meter(level, max) {
        max = max || 5;
        let s = '<div class="meter" aria-label="' + level + " of " + max + '">';
        for (let i = 1; i <= max; i++) s += '<span class="seg' + (i <= level ? " on" : "") + '"></span>';
        return s + "</div>";
      }
      function tags(str) {
        if (!str || str === "-") return "";
        return (
          '<div class="tags">' +
          str.split(",").map((t) => '<span class="tag">' + t.trim() + "</span>").join("") +
          "</div>"
        );
      }

      /* ---------- sections ---------- */
      const SECTIONS = [
        { id: "profile", num: "00", label: "Profile" },
        { id: "projects", num: "01", label: "Projects" },
        { id: "experience", num: "02", label: "Experience" },
        { id: "skills", num: "03", label: "Skills" },
        { id: "education", num: "04", label: "Education" },
      ];

      function eyebrow(num, title) {
        return (
          '<div class="eyebrow"><span class="num">' +
          num +
          '</span><h2>' +
          title +
          '</h2><span class="rule"></span></div>'
        );
      }

      function buildHero() {
        const p = CV.profile;
        const startYear = Math.min(...CV.experience.map((e) => Math.floor(dateNum(e[2], true) / 12)));
        const years = NOW.getFullYear() - startYear;
        const sec = el("section", "hero");

        // Monogram shows the profile photo if provided, with the initials as
        // an automatic fallback if the image is missing or fails to load.
        const mono = p.photo
          ? '<div class="monogram">' +
            '<img src="' + p.photo + '" alt="' + p.name + '" ' +
            "onerror=\"this.remove();this.parentNode.textContent='" + p.initials + "';\" />" +
            "</div>"
          : '<div class="monogram">' + p.initials + "</div>";

        sec.innerHTML =
          '<div class="hero-grid">' +
          mono +
          "<div>" +
          "<h1>" + p.name + "</h1>" +
          '<div class="statusline">' +
          "<span>" + p.title + "</span><span class='dot'>/</span>" +
          "<span>" + years + "+ yrs</span><span class='dot'>/</span>" +
          "<span>" + p.location + "</span><span class='dot'>/</span>" +
          "<span class='live'>" + p.status + "</span>" +
          "</div>" +
          '<div class="chips">' +
          '<a class="chip" href="mailto:' + p.email + '"><b>Email</b>' + p.email + "</a>" +
          '<a class="chip" href="tel:' + p.phone.replace(/\s/g, "") + '"><b>Phone</b>' + p.phone + "</a>" +
          '<a class="chip" href="' + p.blog + '" target="_blank" rel="noopener"><b>Blog</b>' + p.blogLabel + "</a>" +
          "</div></div></div>";
        return sec;
      }

      function buildProfile() {
        const p = CV.profile;
        const s = el("section", "section about reveal");
        s.id = "profile";
        let h = eyebrow("00", "Profile");
        p.about.forEach((para) => (h += "<p>" + para + "</p>"));
        h += '<div class="about-sub">Main roles</div><p>' + p.roles + "</p>";
        h += '<div class="about-sub">Currently looking for</div><p>' + p.lookingFor + "</p>";
        s.innerHTML = h;
        return s;
      }

      function buildProjects() {
        const s = el("section", "section reveal");
        s.id = "projects";
        let h = eyebrow("01", "Featured Projects") + '<div class="proj-grid">';
        CV.featuredProjects.forEach((pr) => {
          h +=
            '<a class="proj-card" href="' + pr.url + '" target="_blank" rel="noopener">' +
            '<div class="proj-head"><h3>' + pr.name + '</h3><span class="proj-kind">' + pr.kind + "</span></div>" +
            '<div class="proj-url">' + pr.display + "</div>" +
            "<p>" + pr.description + "</p>" +
            tags(pr.tags.join(", ")) +
            '<div style="margin-top:16px" class="arrow">Visit &rarr;</div>' +
            "</a>";
        });
        s.innerHTML = h + "</div>";
        return s;
      }

      function buildExperience() {
        const s = el("section", "section reveal");
        s.id = "experience";
        let h = eyebrow("02", "Experience");

        const groups = {};
        const order = [];
        CV.experience.forEach((e) => {
          if (!groups[e[0]]) { groups[e[0]] = []; order.push(e[0]); }
          groups[e[0]].push(e);
        });
        order.sort(
          (a, b) =>
            Math.max(...groups[b].map((e) => dateNum(e[2], false))) -
            Math.max(...groups[a].map((e) => dateNum(e[2], false)))
        );

        h += '<div class="timeline">';
        order.forEach((emp) => {
          const g = groups[emp].slice().sort((a, b) => dateNum(b[2], false) - dateNum(a[2], false));
          const minS = Math.min(...g.map((e) => dateNum(e[2], true)));
          const maxE = Math.max(...g.map((e) => dateNum(e[2], false)));
          h +=
            '<div class="emp">' +
            '<div class="emp-head"><span class="emp-name">' + emp + "</span>" +
            '<span class="emp-date">' + fmt(minS) + " — " + fmt(maxE) + "</span></div>" +
            '<div class="emp-role">' + g[0][1] + "</div>";
          g.forEach((e) => {
            h +=
              '<div class="proj-item">' +
              '<div class="proj-item-top"><span class="proj-item-title">' + e[3] + "</span>" +
              '<span class="proj-item-date">' + fmt(dateNum(e[2], true)) + " — " + fmt(dateNum(e[2], false)) + "</span></div>" +
              '<div class="proj-item-meta"><b>' + e[4] + "</b> &middot; " + e[5] + "</div>" +
              "<p>" + e[6] + "</p>" +
              tags(e[7]) +
              "</div>";
          });
          h += "</div>";
        });
        s.innerHTML = h + "</div>";
        return s;
      }

      function skillCard(title, list) {
        let h = '<div class="skill-card"><h3>' + title + "</h3>";
        list.slice()
          .sort((a, b) => b[1] - a[1])
          .forEach((sk) => {
            h += '<div class="skill-row"><span class="label">' + sk[0] + "</span>" + meter(sk[1]) + "</div>";
          });
        return h + "</div>";
      }

      function buildSkills() {
        const s = el("section", "section reveal");
        s.id = "skills";
        let h = eyebrow("03", "Skills");
        h +=
          '<div class="legend">Experience &nbsp;' +
          '<span style="color:var(--accent)">▮</span> 1yr &middot; ▮▮ 2yr &middot; ▮▮▮ 3yr &middot; ▮▮▮▮ 4yr &middot; ▮▮▮▮▮ 4yr+</div>';
        h += '<div style="height:14px"></div><div class="skill-cols">';
        h += skillCard("Languages & Scripting", CV.languages);
        h += skillCard("Frameworks & Platforms", CV.frameworks);
        h += skillCard("Databases", CV.databases);

        // communication card
        let c = '<div class="skill-card"><h3>Languages spoken</h3>';
        CV.communication.forEach((l) => {
          c +=
            '<div class="comm-row"><span class="comm-lang">' + l[0] + "</span>" +
            '<span class="comm-skill">Read ' + meter(l[1]) + "</span>" +
            '<span class="comm-skill">Write ' + meter(l[2]) + "</span>" +
            '<span class="comm-skill">Listen ' + meter(l[3]) + "</span>" +
            '<span class="comm-skill">Speak ' + meter(l[4]) + "</span>" +
            '<span class="comm-level">' + l[5] + "</span></div>";
        });
        c += "</div>";
        s.innerHTML = h + c + "</div>";
        return s;
      }

      function buildEducation() {
        const e = CV.education;
        const s = el("section", "section reveal");
        s.id = "education";
        let h = eyebrow("04", "Education & Credentials");
        h +=
          '<div class="edu-card"><h3>' + e.degree + "</h3>" +
          '<div class="edu-meta">' + e.school + " &middot; Born " + e.born + "</div>" +
          "<p><b>Thesis.</b> " + e.thesis + "</p>" +
          '<span class="edu-score">' + e.score + "</span></div>";
        h += '<div class="cert-grid">';
        CV.certifications.forEach((ct) => {
          h +=
            '<div class="cert"><div class="code">' + ct[0] + "</div>" +
            '<div class="who">' + ct[1] + "</div>" +
            '<div class="when">' + ct[2] + "</div></div>";
        });
        s.innerHTML = h + "</div>";
        return s;
      }

      /* ---------- mount ---------- */
      function mount() {
        const nav = document.getElementById("nav");
        nav.innerHTML = SECTIONS.map(
          (sc) => '<a href="#' + sc.id + '" data-id="' + sc.id + '">' + sc.label + "</a>"
        ).join("");

        const root = document.getElementById("root");
        root.appendChild(buildHero());
        root.appendChild(buildProfile());
        root.appendChild(buildProjects());
        root.appendChild(buildExperience());
        root.appendChild(buildSkills());
        root.appendChild(buildEducation());

        document.getElementById("foot-update").textContent =
          "Last updated " + document.lastModified;

        // scroll reveal
        const reveals = document.querySelectorAll(".reveal");
        if ("IntersectionObserver" in window) {
          const io = new IntersectionObserver(
            (entries) => entries.forEach((en) => en.isIntersecting && en.target.classList.add("in")),
            { threshold: 0.08 }
          );
          reveals.forEach((r) => io.observe(r));
        } else {
          reveals.forEach((r) => r.classList.add("in"));
        }

        // scrollspy
        const links = nav.querySelectorAll("a");
        const spy = new IntersectionObserver(
          (entries) => {
            entries.forEach((en) => {
              if (en.isIntersecting) {
                links.forEach((l) => l.classList.toggle("active", l.dataset.id === en.target.id));
              }
            });
          },
          { rootMargin: "-45% 0px -50% 0px" }
        );
        SECTIONS.forEach((sc) => {
          const node = document.getElementById(sc.id);
          if (node) spy.observe(node);
        });
      }

      mount();
    </script>
